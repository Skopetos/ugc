  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/fiv/favicon.ico" />

<body>

  <nav>
    <a class="nav-logo" href="/">TryItAway</a>
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/portfolio.html" class="active">Portfolio</a></li>
      <li><a href="/services.html">Services</a></li>
      <li><a href="/about.html">About</a></li>

  <main>

      </div>

      <!-- Filter bar -->
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>

        <button class="filter-btn" data-filter="food-coffee">Food &amp; Coffee</button>
        <button class="filter-btn" data-filter="accommodation">Accommodation</button>

<div class="portfolio-grid" id="portfolio-grid"></div>
    </section>

    <div class="lightbox-content">
      <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕ close</button>
      <div id="lightbox-media"></div>
    </div>
